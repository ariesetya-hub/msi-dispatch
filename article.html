<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MSI Situation Report</title>
<meta name="description" content="The MSI Situation Report — Field intelligence from the Molay Satrya Indonesia Group."/>
<link rel="icon" type="image/png" href="https://molaysatrya.id/MOLAY_Roundel_CustodiServientem_NY.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>

<!-- ═══ CLOUDINARY CONFIG ═══ -->
<script>
  var CLOUDINARY_CLOUD = 'ml_default';
  var GITHUB_USER      = 'ariesetya-hub';
  var GITHUB_REPO      = 'msi-dispatch';
  var GITHUB_BRANCH    = 'main';
  function cloudinaryUrl(publicId, w, q) {
    if (!publicId) return '';
    if (publicId.startsWith('http')) return publicId;
    return 'https://res.cloudinary.com/' + CLOUDINARY_CLOUD + '/image/upload/w_' + (w||1600) + ',q_' + (q||80) + '/' + publicId;
  }
  function contentUrl(slug) {
    return 'https://raw.githubusercontent.com/' + GITHUB_USER + '/' + GITHUB_REPO + '/' + GITHUB_BRANCH + '/content/' + slug + '.json';
  }
</script>

<style>
:root{
  --navy:#080e1c; --navy2:#0d1828; --navy3:#0f2040;
  --gold:#c9970a; --gold2:#fab811;
  --cream:#f0ebe0; --text:#c8bfa8; --muted:#8a9bb0;
  --nav-h:80px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:200;
  display:flex;align-items:center;justify-content:space-between;padding:20px 48px;
  background:rgba(8,14,28,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(15,32,64,.7);}
.nav-logo{display:flex;align-items:center;gap:14px;text-decoration:none;}
.nav-seal{width:40px;height:40px;border-radius:50%;overflow:hidden;border:1px solid rgba(201,151,10,.4);}
.nav-seal img{width:100%;height:100%;object-fit:cover;}
.nav-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold2);line-height:1.1;}
.nav-sub{font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:4px;text-transform:uppercase;color:rgba(250,184,17,.5);}
.nav-links{display:flex;gap:36px;align-items:center;}
.nav-link{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;}
.nav-link:hover,.nav-link.active{color:var(--gold2);}
@media(max-width:640px){nav{padding:16px 24px;} .nav-links{display:none;}}

/* ── TRI STRIPE ── */
.tri-stripe{display:flex;height:6px;}
.ts1{flex:4;background:#987F60;} .ts2{flex:2;background:#000;} .ts3{flex:4;background:#7E7E42;}
.tri-stripe-sm{display:flex;height:3px;}
.tri-stripe-sm .ts1{flex:4;background:#987F60;} .tri-stripe-sm .ts2{flex:2;background:#000;} .tri-stripe-sm .ts3{flex:4;background:#7E7E42;}

/* ── DISPATCH SUBNAV ── */
.dispatch-subnav{background:var(--navy2);border-bottom:1px solid rgba(201,151,10,.15);
  padding:0 72px;height:44px;display:flex;align-items:center;justify-content:space-between;}
.dispatch-subnav a{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-decoration:none;transition:opacity .2s;}
.dispatch-subnav a:hover{opacity:.7;}
.dispatch-subnav-center{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
@media(max-width:640px){.dispatch-subnav{padding:0 24px;} .dispatch-subnav-center{display:none;}}

/* ── HERO ── */
.article-hero{position:relative;height:72vh;min-height:480px;overflow:hidden;display:flex;align-items:flex-end;}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.5);}
.hero-bg-placeholder{position:absolute;inset:0;background:linear-gradient(135deg,var(--navy3),var(--navy2));}
.hero-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,14,28,1) 0%,rgba(8,14,28,.5) 40%,transparent 100%);}
.hero-content{position:relative;z-index:2;padding:0 72px 56px;width:100%;}
.hero-meta-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.hero-badge{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;border:1px solid rgba(201,151,10,.4);padding:4px 12px;color:var(--gold);}
.hero-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.5;}
.hero-date{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(32px,5.5vw,72px);font-weight:800;line-height:1.0;letter-spacing:.5px;color:#fff;max-width:900px;margin-bottom:18px;}
.hero-sub{font-family:'EB Garamond',serif;font-size:18px;font-style:italic;color:var(--text);max-width:560px;line-height:1.6;margin-bottom:20px;}
.hero-stats{display:flex;align-items:center;gap:20px;}
.hero-stat{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
@media(max-width:640px){.hero-content{padding:0 24px 40px;} .article-hero{height:60vh;}}

/* ── ARTICLE BODY ── */
.article-body{max-width:740px;margin:0 auto;padding:72px 24px 80px;}

/* Section header */
.sec-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:10px;margin-top:56px;}
.sec-label::after{content:'';flex:1;height:1px;background:rgba(201,151,10,.2);}
.sec-label:first-child{margin-top:0;}
.sec-heading{font-family:'Barlow Condensed',sans-serif;font-size:clamp(22px,3.5vw,38px);font-weight:700;color:var(--cream);line-height:1.1;margin-bottom:28px;}

/* Body copy */
.body-copy{font-family:'EB Garamond',serif;font-size:19px;color:var(--text);line-height:1.85;margin-bottom:22px;text-align:justify;}

/* Pull quote */
.pullquote{border-left:3px solid var(--gold);padding:18px 28px;margin:40px 0;background:rgba(201,151,10,.04);}
.pullquote p{font-family:'EB Garamond',serif;font-size:22px;font-style:italic;color:var(--cream);line-height:1.6;}
.pullquote cite{display:block;margin-top:10px;font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}

/* Photo */
.article-photo{margin:36px 0;}
.article-photo img{width:100%;display:block;max-height:480px;object-fit:cover;filter:brightness(.9);}
.article-photo-placeholder{width:100%;height:300px;background:rgba(201,151,10,.04);border:1px dashed rgba(201,151,10,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.article-photo-placeholder span{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(201,151,10,.4);}
.photo-caption{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:8px;padding-left:2px;}

/* Divider */
.article-divider{height:1px;background:rgba(201,151,10,.15);margin:52px 0;}

/* Brand card */
.brand-card{background:var(--navy2);border:1px solid rgba(201,151,10,.2);padding:32px;margin:40px 0;position:relative;overflow:hidden;}
.brand-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),transparent);}
.brand-card-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.brand-card-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--cream);margin-bottom:14px;}
.brand-card-body{font-family:'Barlow',sans-serif;font-size:14px;color:var(--muted);line-height:1.75;}

/* Venue details */
.venue-details{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px;padding-top:18px;border-top:1px solid rgba(201,151,10,.12);}
.venue-item-label{font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}
.venue-item-val{font-family:'Barlow',sans-serif;font-size:13px;color:var(--muted);}

/* Command statement */
.command{background:var(--navy2);border-top:1px solid rgba(201,151,10,.25);border-bottom:1px solid rgba(201,151,10,.25);padding:52px 40px;margin:56px -40px;text-align:center;}
.command p{font-family:'EB Garamond',serif;font-size:clamp(17px,2.2vw,24px);font-style:italic;color:var(--cream);line-height:1.75;max-width:620px;margin:0 auto 20px;}
.command-motto{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);}
@media(max-width:640px){.command{margin:56px -24px;padding:40px 24px;}}

/* CTA row */
.cta-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:52px;}
.btn-primary{display:inline-flex;align-items:center;gap:10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,151,10,.45);padding:13px 28px;text-decoration:none;background:rgba(201,151,10,.05);transition:all .25s;}
.btn-primary:hover{background:rgba(201,151,10,.13);border-color:var(--gold);}
.btn-secondary{display:inline-flex;align-items:center;gap:10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);border:1px solid rgba(138,155,176,.25);padding:13px 28px;text-decoration:none;transition:all .25s;}
.btn-secondary:hover{color:var(--cream);border-color:rgba(201,151,10,.3);}

/* Sources */
.sources{margin-top:52px;padding-top:28px;border-top:1px solid rgba(201,151,10,.12);}
.sources-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.sources ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.sources li a{font-family:'Barlow',sans-serif;font-size:12px;color:var(--muted);text-decoration:none;opacity:.65;transition:opacity .2s;}
.sources li a:hover{opacity:1;color:var(--gold);}

/* Footer */
footer{background:#040810;padding:40px 48px;text-align:center;border-top:1px solid rgba(201,151,10,.1);}
footer p{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);opacity:.5;}
.gold-word{color:var(--gold);opacity:.8 !important;}

/* Loading / error states */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;}
#loading .spinner{width:32px;height:32px;border:2px solid rgba(201,151,10,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading p{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
#error-msg{display:none;padding:80px 48px;text-align:center;}
#error-msg h2{font-family:'Barlow Condensed',sans-serif;font-size:24px;color:var(--gold);margin-bottom:12px;}
#error-msg p{font-family:'Barlow',sans-serif;font-size:14px;color:var(--muted);}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="https://molaysatrya.id">
    <div class="nav-seal"><img src="https://molaysatrya.id/MOLAY_Roundel_CustodiServientem_NY.png" alt="MSI"/></div>
    <div>
      <div class="nav-name">Molay Satrya Indonesia</div>
      <div class="nav-sub">Group</div>
    </div>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="https://molaysatrya.id/#about">About</a>
    <a class="nav-link" href="https://molaysatrya.id/#ventures">Brands</a>
    <a class="nav-link active" href="index.html">The Dispatch</a>
    <a class="nav-link" href="https://molaysatrya.id/#contact">Contact</a>
  </div>
</nav>

<!-- MAIN CONTENT — rendered by JS -->
<div id="app" style="margin-top:var(--nav-h);">
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading Brief...</p>
  </div>
  <div id="error-msg">
    <h2>Brief Not Found</h2>
    <p>This dispatch could not be located. Return to the <a href="index.html" style="color:var(--gold);">archive</a>.</p>
  </div>
  <div id="article-root" style="display:none;"></div>
</div>

<script>
// ═══════════════════════════════════════════════
//  MSI DISPATCH — Article Renderer
//  Template version 1.0 — DO NOT MODIFY LAYOUT
// ═══════════════════════════════════════════════

function getSlug() {
  var params = new URLSearchParams(window.location.search);
  return params.get('slug');
}

function renderPhoto(section) {
  if (!section.url) {
    return '<div class="article-photo">'
      + '<div class="article-photo-placeholder"><span>◈ Photo — ' + (section.caption || 'Image pending') + '</span></div>'
      + '</div>';
  }
  var src = cloudinaryUrl(section.url, 1400, 85);
  return '<div class="article-photo">'
    + '<img src="' + src + '" alt="' + (section.caption || '') + '" loading="lazy"/>'
    + (section.caption ? '<div class="photo-caption">' + section.caption + '</div>' : '')
    + '</div>';
}

function renderSection(s) {
  switch(s.type) {
    case 'section-header':
      return '<div class="sec-label">' + s.label + '</div>'
           + '<div class="sec-heading">' + s.heading + '</div>';

    case 'body':
      return '<p class="body-copy">' + s.text + '</p>';

    case 'pullquote':
      return '<div class="pullquote"><p>' + s.text + '</p>'
           + (s.cite ? '<cite>— ' + s.cite + '</cite>' : '')
           + '</div>';

    case 'photo':
      return renderPhoto(s);

    case 'divider':
      return '<div class="article-divider"></div>';

    case 'brand-card':
      var venueHtml = '';
      if (s.details && s.details.length) {
        venueHtml = '<div class="venue-details">';
        s.details.forEach(function(d) {
          venueHtml += '<div><div class="venue-item-label">' + d.label + '</div>'
                     + '<div class="venue-item-val">' + d.value + '</div></div>';
        });
        venueHtml += '</div>';
      }
      return '<div class="brand-card">'
           + '<div class="brand-card-label">' + (s.label || '') + '</div>'
           + '<div class="brand-card-title">' + (s.title || '') + '</div>'
           + '<div class="brand-card-body">' + (s.text || '') + '</div>'
           + venueHtml
           + '</div>';

    case 'command':
      return '<div class="command">'
           + '<p>' + s.text + '</p>'
           + '<div class="command-motto">' + (s.motto || 'Custodi Servientem') + '</div>'
           + '</div>';

    case 'cta':
      var btns = '';
      (s.buttons || []).forEach(function(b, i) {
        var cls = i === 0 ? 'btn-primary' : 'btn-secondary';
        btns += '<a class="' + cls + '" href="' + (b.url || '#') + '" target="' + (b.external ? '_blank' : '_self') + '">↗ ' + b.label + '</a>';
      });
      return '<div class="cta-row">' + btns + '</div>';

    case 'sources':
      if (!s.items || !s.items.length) return '';
      var items = s.items.map(function(i) {
        return '<li><a href="' + i.url + '" target="_blank">' + i.label + '</a></li>';
      }).join('');
      return '<div class="sources"><div class="sources-label">Intelligence Sources</div><ul>' + items + '</ul></div>';

    default:
      return '';
  }
}

function buildBrandTags(brands) {
  return (brands || []).map(function(b) {
    return '<span style="font-family:\'Barlow Condensed\',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,151,10,.25);padding:3px 9px;margin-right:6px;">' + b + '</span>';
  }).join('');
}

function buildHeroBg(img) {
  if (!img) return '<div class="hero-bg-placeholder"></div>';
  var src = cloudinaryUrl(img, 1920, 80);
  return '<div class="hero-bg" style="background-image:url(\'' + src + '\');"></div>';
}

function renderArticle(d) {
  // Update page meta
  document.title = d.headline + ' — MSI Situation Report';

  var sectionsHtml = (d.sections || []).map(renderSection).join('\n');

  var html = ''
    // Tri stripe
    + '<div class="tri-stripe"><div class="ts1"></div><div class="ts2"></div><div class="ts3"></div></div>'

    // Sub-nav
    + '<div class="dispatch-subnav">'
    + '<a href="index.html">← All Dispatches</a>'
    + '<span class="dispatch-subnav-center">The MSI Situation Report — Week ' + (d.week || '—') + ', ' + (d.year || '2026') + '</span>'
    + (d.next_slug ? '<a href="article.html?slug=' + d.next_slug + '">Next Issue →</a>' : '<span></span>')
    + '</div>'

    // Hero
    + '<div class="article-hero">'
    + buildHeroBg(d.hero_image)
    + '<div class="hero-gradient"></div>'
    + '<div class="hero-content">'
    + '<div class="hero-meta-row">'
    + '<span class="hero-badge">' + (d.edition || 'Customer Edition') + '</span>'
    + '<div class="hero-dot"></div>'
    + '<span class="hero-badge">Week ' + (d.week || '—') + '</span>'
    + '<div class="hero-dot"></div>'
    + '<span class="hero-date">' + (d.date || '') + '</span>'
    + '</div>'
    + '<h1 class="hero-title">' + (d.headline || '') + '</h1>'
    + (d.subheadline ? '<p class="hero-sub">' + d.subheadline + '</p>' : '')
    + '<div class="hero-stats">'
    + buildBrandTags(d.brands)
    + '<span class="hero-stat" style="margin-left:12px;">' + (d.read_time || '8') + ' min read</span>'
    + '</div>'
    + '</div>'
    + '</div>'

    // Body
    + '<div class="article-body">' + sectionsHtml + '</div>'

    // Footer
    + '<div class="tri-stripe-sm"><div class="ts1"></div><div class="ts2"></div><div class="ts3"></div></div>'
    + '<footer>'
    + '<p><span class="gold-word">Molay Satrya Indonesia Group</span> &nbsp;//&nbsp; One Vision. Integrated Disciplines. &nbsp;//&nbsp; <span class="gold-word">Custodi Servientem</span></p>'
    + '<p style="margin-top:10px;">© 2026 PT. Molay Satrya Indonesia. All rights reserved. &nbsp;·&nbsp; <a href="https://molaysatrya.id" style="color:var(--gold);text-decoration:none;">molaysatrya.id</a></p>'
    + '</footer>';

  document.getElementById('loading').style.display = 'none';
  document.getElementById('article-root').style.display = 'block';
  document.getElementById('article-root').innerHTML = html;
}

// ── MAIN: fetch article JSON ──
(function() {
  var slug = getSlug();
  if (!slug) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    return;
  }
  var url = contentUrl(slug);
  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('Not found');
      return r.json();
    })
    .then(function(data) { renderArticle(data); })
    .catch(function() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
    });
})();
</script>
</body>
</html>
